# Config for the api-gateway service (apps/platform-core/api-gateway).
# Must live at repo root: Railway's config-as-code file does not follow a
# service's Root Directory setting, it's always resolved from repo root.
# Commands below still execute relative to that service's Root Directory
# (set in Railway dashboard -> Settings -> Source), so paths here are as if
# cwd is apps/platform-core/api-gateway.
#
# If a second Railway service is added later, it needs its own explicit
# config-as-code path set in the Railway dashboard (Settings -> Config-as-code)
# pointing at its own toml file, since this one only covers api-gateway.
#
# History of two failed approaches, for anyone tempted to "fix" this again:
# 1. A custom [build] buildCommand = "pip install -e ." on a pyproject.toml
#    (src-layout) project: pip install succeeded in the build log, but the
#    installed package never made it into the runtime image
#    ("No module named uvicorn" despite a "Successfully installed" build
#    line moments earlier).
# 2. Removing the buildCommand entirely: Railpack's zero-config Python
#    detection recognizes pyproject.toml/setuptools projects but does NOT
#    auto-generate an install step for them (no Poetry/uv lockfile it
#    natively understands) -- the build log showed no install step ran at
#    all, so nothing was ever installed.
# Fix: the app is now a flat main.py (no src/ package, no pyproject.toml)
# with a plain requirements.txt, which Railpack's Python provider has
# first-class native support for -- it generates its own install step that
# correctly persists into the runtime image.

[deploy]
# Use "python -m uvicorn" rather than the bare "uvicorn" binary: Railpack's
# mise-managed Python puts console-script shims on a PATH that the deploy
# stage's `bash -c` doesn't reliably inherit ("uvicorn: command not found"
# in practice), but `python` itself is always resolvable.
startCommand = "python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
