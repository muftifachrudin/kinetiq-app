# Walk-forward window config for fib_gann_backtest/run_validation.py.
# Single YAML file shared by every caller of generate_windows_by_calendar()
# (docs/fib-gann-validation-brief.md Section 6: "Config walk-forward
# (train_months, test_months, embargo_days, mode) di satu file YAML,
# dipakai kedua caller") -- fib_gann_backtest today, MARKOVIZ V5's own
# migration to packages/backtest-core later if that happens.

venue: binance
symbol: "BTC/USDT:USDT"
timeframe: "1h"

# Passed straight to load_candles(limit=...) -- data_loader.py has no
# date-range query, only "most recent N", so run_validation.py loads this
# many candles and slices them by window boundaries client-side.
candle_load_limit: 100000

max_holding_bars: 20

# docs/validation-deep-dive-2026-07.md Section 3/F5: trade_simulator.py was
# funding-aware but gross-of-fees, and fees turned out to be the dominant
# real-money cost for this ~11h-average-holding intraday system (a 0.10%
# taker-taker round-trip flips baseline mean trade return negative; funding
# for the same holding period is ~20x smaller). Default here is Binance
# USDT-M VIP0 taker (0.05% per side) -- override per-venue if a different
# fee tier applies. Additive: both default to 0.0 if this section is
# omitted entirely, so an older config file (or a caller that doesn't read
# this key) behaves exactly as before fees existed.
fees:
  entry_fraction: 0.0005
  exit_fraction: 0.0005

walk_forward:
  train_months: 1
  test_months: 1
  embargo_days: 1
  step_months: 1
  mode: anchored # ANCHORED matches generate_windows_by_calendar()'s own default for the calendar scheme

promotion:
  # Design brief Section 7: "PF net > 1.3 konsisten di minimal 4 dari 6 window test"
  pf_net_threshold: 1.3
  # 4/6 = 0.6666... -- deliberately rounded DOWN to 0.6666, not up to
  # 0.6667: the naive rounded-up literal would make "exactly 4 of 6
  # windows passing" fail its own criterion (4/6 < 0.6667), which
  # directly contradicts the brief's literal wording. Caught by
  # test_promotion_pf_stats_counts_windows_strictly_above_threshold.
  pf_pass_fraction: 0.6666
  # The brief's OTHER promotion criterion ("Agreement rate > 60% terhadap
  # trade_annotation manual") is NOT evaluated by run_validation.py yet --
  # trade_annotation has no signal_id linkage to a specific generated
  # signal (see packages/db/migrations/versions/0005's docstring), so
  # there is nothing to compute agreement against. Reported explicitly
  # as not-yet-computable in every report, not silently skipped.
