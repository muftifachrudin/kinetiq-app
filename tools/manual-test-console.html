<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Kinetiq Manual Test Console</title>
<!--
  Manual QA tool for api-gateway auth + plan-gating + billing stopgap.
  Not part of the deployed app -- open this file directly in a browser
  (see setup steps below) to click through the flow instead of using curl.

  SETUP (one-time):
  1. Serve this file over http(s), don't just double-click it -- Clerk's
     SDK generally needs a real http(s) origin, not file://. Easiest:
        cd tools && python -m http.server 8080
     then open http://localhost:8080/manual-test-console.html
     (use `python3` instead of `python` on macOS/Linux if needed)
  2. Paste your Clerk Publishable Key below (Clerk Dashboard -> API Keys
     -> Publishable key, starts with pk_test_ or pk_live_) and click
     "Load Clerk". This key is safe to use in a plain page -- it's meant
     to be public/client-side, unlike the Secret Key.
  3. If Clerk shows an origin/domain error, add that localhost URL under
     Clerk Dashboard -> Configure -> Domains (or "Allowed origins").

  Why not the generic cdn.clerk.io/clerk.js loader: that bundle doesn't
  include Clerk's UI components, so mountSignIn() fails with "Clerk was
  not loaded with UI components". The Publishable Key itself encodes your
  Clerk Frontend API domain (base64, after stripping the pk_test_/pk_live_
  prefix and trailing $) -- Clerk's own bundle must be loaded from that
  domain instead, per Clerk's own script-tag quickstart.
-->
<style>
  body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
  input { width: 100%; padding: 0.4rem; margin-bottom: 0.5rem; box-sizing: border-box; }
  button { margin: 0.25rem 0.25rem 0.25rem 0; padding: 0.5rem 0.8rem; cursor: pointer; }
  pre { background: #111; color: #0f0; padding: 1rem; overflow-x: auto; white-space: pre-wrap; word-break: break-word; }
  #status { font-weight: bold; }
  label { display: block; margin-top: 0.75rem; }
</style>
</head>
<body>
<h1>Kinetiq Manual Test Console</h1>

<label for="pub-key">Clerk Publishable Key (pk_test_... or pk_live_...)</label>
<input id="pub-key" placeholder="pk_test_..." />
<button id="btn-load-clerk">Load Clerk</button>

<label for="api-base">API base URL</label>
<input id="api-base" value="https://kinetiq-id.up.railway.app" />

<div id="sign-in"></div>

<div id="signed-in" style="display:none">
  <p id="status"></p>
  <button id="btn-me">GET /me</button>
  <button id="btn-sub-auto">POST /billing/subscribe (auto_execute)</button>
  <button id="btn-sub-signal">POST /billing/subscribe (signal_only)</button>
  <button id="btn-gated">GET /trading/auto-execute/status</button>
  <button id="btn-signout">Sign out</button>
</div>

<h3>Response</h3>
<pre id="output">(nothing yet)</pre>

<script>
const out = (text) => { document.getElementById('output').textContent = text; };

function frontendApiFromKey(key) {
  const withoutPrefix = key.replace(/^pk_(test|live)_/, '');
  const decoded = atob(withoutPrefix).replace(/\$$/, '');
  return `https://${decoded}`;
}

function loadScript(src, publishableKey) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.async = true;
    s.crossOrigin = 'anonymous';
    s.dataset.clerkPublishableKey = publishableKey;
    s.onload = resolve;
    s.onerror = () => reject(new Error(`Failed to load ${src}`));
    document.head.appendChild(s);
  });
}

async function loadClerk() {
  const key = document.getElementById('pub-key').value.trim();
  if (!key) { out('Paste your Clerk Publishable Key first.'); return; }
  localStorage.setItem('kinetiq_pub_key', key);

  let frontendApi;
  try {
    frontendApi = frontendApiFromKey(key);
  } catch (e) {
    out(`Could not decode Frontend API domain from that key -- is it a valid pk_test_/pk_live_ key?\n${e}`);
    return;
  }

  out(`Loading Clerk from ${frontendApi} ...`);
  try {
    await loadScript(`${frontendApi}/npm/@clerk/clerk-js@latest/dist/clerk.browser.js`, key);
    await window.Clerk.load();
  } catch (e) {
    out(`Clerk failed to load: ${e}\n\nIf this mentions a blocked origin/domain, add this page's URL under Clerk Dashboard -> Configure -> Domains.`);
    return;
  }

  out('Clerk loaded.');
  render();
  window.Clerk.addListener(render);
}

function render() {
  const user = window.Clerk.user;
  if (user) {
    document.getElementById('sign-in').style.display = 'none';
    document.getElementById('signed-in').style.display = 'block';
    document.getElementById('status').textContent = `Signed in as ${user.primaryEmailAddress?.emailAddress ?? user.id}`;
  } else {
    document.getElementById('sign-in').style.display = 'block';
    document.getElementById('signed-in').style.display = 'none';
    window.Clerk.mountSignIn(document.getElementById('sign-in'));
  }
}

function apiBase() {
  return document.getElementById('api-base').value.replace(/\/$/, '');
}

async function callApi(method, path, body) {
  const token = await window.Clerk.session.getToken();
  const resp = await fetch(apiBase() + path, {
    method,
    headers: {
      'Authorization': `Bearer ${token}`,
      ...(body ? { 'Content-Type': 'application/json' } : {}),
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  let text;
  try { text = JSON.stringify(await resp.json(), null, 2); }
  catch { text = await resp.text(); }
  out(`HTTP ${resp.status}\n\n${text}`);
}

document.getElementById('btn-load-clerk').onclick = loadClerk;
document.getElementById('btn-me').onclick = () => callApi('GET', '/me');
document.getElementById('btn-sub-auto').onclick = () => callApi('POST', '/billing/subscribe', { plan_tier: 'auto_execute' });
document.getElementById('btn-sub-signal').onclick = () => callApi('POST', '/billing/subscribe', { plan_tier: 'signal_only' });
document.getElementById('btn-gated').onclick = () => callApi('GET', '/trading/auto-execute/status');
document.getElementById('btn-signout').onclick = () => window.Clerk.signOut();

window.addEventListener('load', () => {
  const saved = localStorage.getItem('kinetiq_pub_key');
  if (saved) document.getElementById('pub-key').value = saved;
});
</script>
</body>
</html>
