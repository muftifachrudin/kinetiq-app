<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Kinetiq Manual Test Console</title>
<!--
  Manual QA tool for api-gateway auth + plan-gating + billing stopgap.
  Not part of the deployed app -- open this file directly in a browser
  (see setup steps below) to click through the flow instead of using curl.

  SETUP (one-time):
  1. Replace REPLACE_WITH_YOUR_PUBLISHABLE_KEY below with your Clerk
     Publishable Key (Clerk Dashboard -> API Keys -> Publishable key,
     starts with pk_test_ or pk_live_). This is safe to put in a plain
     file -- it's meant to be public/client-side, unlike the Secret Key.
  2. Serve this file over http(s), don't just double-click it -- Clerk's
     SDK generally needs a real http(s) origin, not file://. Easiest:
        cd tools && python3 -m http.server 8080
     then open http://localhost:8080/manual-test-console.html
  3. If Clerk shows an origin/domain error, add that localhost URL under
     Clerk Dashboard -> Configure -> Domains (or "Allowed origins").
-->
<script
  async
  crossorigin="anonymous"
  data-clerk-publishable-key="REPLACE_WITH_YOUR_PUBLISHABLE_KEY"
  src="https://cdn.clerk.io/clerk.js"
></script>
<style>
  body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
  #api-base { width: 100%; padding: 0.4rem; margin-bottom: 1rem; }
  button { margin: 0.25rem 0.25rem 0.25rem 0; padding: 0.5rem 0.8rem; cursor: pointer; }
  pre { background: #111; color: #0f0; padding: 1rem; overflow-x: auto; white-space: pre-wrap; word-break: break-word; }
  .warn { background: #fffbe6; border: 1px solid #e6c200; padding: 0.75rem; margin-bottom: 1rem; }
  #status { font-weight: bold; }
</style>
</head>
<body>
<h1>Kinetiq Manual Test Console</h1>

<div class="warn" id="key-warning">
  Edit this file first: replace <code>REPLACE_WITH_YOUR_PUBLISHABLE_KEY</code>
  in the &lt;script&gt; tag near the top with your real Clerk Publishable Key,
  then reload this page.
</div>

<label for="api-base">API base URL</label>
<input id="api-base" value="https://kinetiq-id.up.railway.app" />

<div id="sign-in"></div>

<div id="signed-in" style="display:none">
  <p id="status"></p>
  <button id="btn-me">GET /me</button>
  <button id="btn-sub-auto">POST /billing/subscribe (auto_execute)</button>
  <button id="btn-sub-signal">POST /billing/subscribe (signal_only)</button>
  <button id="btn-gated">GET /trading/auto-execute/status</button>
  <button id="btn-signout">Sign out</button>
</div>

<h3>Response</h3>
<pre id="output">(nothing yet)</pre>

<script>
async function boot() {
  if (!window.Clerk) {
    document.getElementById('output').textContent =
      'Clerk.js did not load. Check the publishable key in the <script> tag and that this page is served over http(s), not file://.';
    return;
  }
  document.getElementById('key-warning').style.display =
    document.querySelector('script[data-clerk-publishable-key]').dataset.clerkPublishableKey.startsWith('REPLACE_WITH')
      ? 'block' : 'none';

  await window.Clerk.load();

  function render() {
    const user = window.Clerk.user;
    if (user) {
      document.getElementById('sign-in').style.display = 'none';
      document.getElementById('signed-in').style.display = 'block';
      document.getElementById('status').textContent = `Signed in as ${user.primaryEmailAddress?.emailAddress ?? user.id}`;
    } else {
      document.getElementById('sign-in').style.display = 'block';
      document.getElementById('signed-in').style.display = 'none';
      window.Clerk.mountSignIn(document.getElementById('sign-in'));
    }
  }
  render();
  window.Clerk.addListener(render);

  function apiBase() {
    return document.getElementById('api-base').value.replace(/\/$/, '');
  }

  async function callApi(method, path, body) {
    const token = await window.Clerk.session.getToken();
    const resp = await fetch(apiBase() + path, {
      method,
      headers: {
        'Authorization': `Bearer ${token}`,
        ...(body ? { 'Content-Type': 'application/json' } : {}),
      },
      body: body ? JSON.stringify(body) : undefined,
    });
    let text;
    try { text = JSON.stringify(await resp.json(), null, 2); }
    catch { text = await resp.text(); }
    document.getElementById('output').textContent = `HTTP ${resp.status}\n\n${text}`;
  }

  document.getElementById('btn-me').onclick = () => callApi('GET', '/me');
  document.getElementById('btn-sub-auto').onclick = () => callApi('POST', '/billing/subscribe', { plan_tier: 'auto_execute' });
  document.getElementById('btn-sub-signal').onclick = () => callApi('POST', '/billing/subscribe', { plan_tier: 'signal_only' });
  document.getElementById('btn-gated').onclick = () => callApi('GET', '/trading/auto-execute/status');
  document.getElementById('btn-signout').onclick = () => window.Clerk.signOut();
}

window.addEventListener('load', boot);
</script>
</body>
</html>
