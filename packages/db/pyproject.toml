[project]
name = "kinetiq-db"
version = "0.1.0"
description = "SQLAlchemy models + Alembic migrations for Kinetiq (source of truth schema)"
requires-python = ">=3.11"
dependencies = [
    "sqlalchemy>=2.0",
    "alembic>=1.13",
    "psycopg[binary]>=3.1",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
