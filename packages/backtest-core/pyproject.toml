[project]
name = "kinetiq-backtest"
version = "0.1.0"
description = "Shared walk-forward windowing utilities for Kinetiq strategy validation harnesses (one definition, reused by every backtest caller)"
requires-python = ">=3.11"
dependencies = [
    "python-dateutil>=2.8",
]

[project.optional-dependencies]
# scikit-learn/numpy are validation-harness-only (fit_weights.py, Fase 3 of
# docs/sonnet5-implementation-roadmap.md) -- deliberately kept out of the
# repo root requirements.txt and apps/products/trading/ingestion/
# requirements.txt, which is what production services (api-gateway, the
# ingestion worker) actually install. CI's `test` job installs this [dev]
# extra, so scikit-learn is available there without touching any
# production service's dependency set.
dev = ["pytest>=8.0", "scikit-learn>=1.3", "numpy>=1.24"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
