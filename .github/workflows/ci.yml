name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, closed]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install packages/db + packages/backtest-core + ruff
        run: pip install -e packages/db -e packages/backtest-core ruff
      - name: Ruff check
        run: ruff check packages/db/src packages/db/migrations packages/backtest-core/src packages/backtest-core/tests apps/products/trading/agent-orchestrator apps/products/trading/ingestion

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install packages/backtest-core + pytest
        # pyyaml: agent-orchestrator/validation/fib_gann_backtest/run_validation.py
        # reads configs/walk_forward_windows.yaml -- not a backtest-core
        # dependency, so it isn't pulled in by the -e install above.
        run: pip install -e "packages/backtest-core[dev]" pytest pyyaml
      - name: Run tests
        run: pytest packages/backtest-core/tests apps/products/trading/agent-orchestrator/tests

  # Separate job (not folded into `test` above) because it needs a genuinely
  # different dependency set: ccxt/requests/sqlalchemy/psycopg + packages/db
  # (for kinetiq_db), none of which packages/backtest-core's tests need. All
  # tests here are pure-logic (fake ccxt exchange objects, no real network,
  # no real DATABASE_URL) -- see apps/products/trading/ingestion/tests/
  # test_ingest.py's own docstring for why the DB/network-touching parts of
  # ingest.py/worker.py stay manually-verified instead.
  ingestion-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install packages/db + ingestion deps + pytest
        run: pip install -e packages/db -r apps/products/trading/ingestion/requirements.txt pytest
      - name: Run tests
        run: pytest apps/products/trading/ingestion/tests

  # api-gateway isn't a package (flat main.py/deps.py, see railway.toml's
  # header comment for why), so it needs packages/db installed for
  # kinetiq_db plus its own root requirements.txt for fastapi/sqlalchemy/etc,
  # same shape as ingestion-test above. httpx is test-only (fastapi's
  # TestClient needs it, production main.py doesn't import it directly).
  api-gateway-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install packages/db + api-gateway deps + pytest
        run: pip install -e packages/db -r requirements.txt pytest httpx
      - name: Run tests
        run: pytest apps/platform-core/api-gateway/tests

  # First JS/TS app in the repo (Slice 2, docs/post-research-vertical-slices.md).
  # Lint + production build only -- no real Clerk project exists to run
  # against in CI, so this just proves the app compiles/typechecks, same
  # boundary as api-gateway-test not covering a real DATABASE_URL.
  dashboard-shell-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/platform-core/dashboard-shell
    env:
      # Not real credentials -- a well-formed-enough placeholder so
      # ClerkProvider/clerkMiddleware don't reject the key shape at build
      # time. Real keys are set as Railway/Vercel env vars at deploy time.
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ZHVtbXkuY2xlcmsuYWNjb3VudHMuZGV2JA
      CLERK_SECRET_KEY: sk_test_dummy_dummy_dummy_dummy_dummy_dummy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/platform-core/dashboard-shell/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  # Requires the Neon GitHub integration (Neon Console -> project -> Settings
  # -> Integrations -> connect this repo), which auto-sets the NEON_API_KEY
  # secret and NEON_PROJECT_ID variable used below. See docs/prd.md Section
  # C.3 for the full design and B.11 for why CoinGlass/Neon tier choices
  # matter here.
  neon-preview-branch:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Neon branch for this PR
        id: create-branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install migration deps
        run: pip install -e packages/db

      - name: Run Alembic migration against the PR branch
        working-directory: packages/db
        env:
          DATABASE_URL: ${{ steps.create-branch.outputs.db_url }}
        run: alembic upgrade head

      - name: Post schema diff as a PR comment
        uses: neondatabase/schema-diff-action@v1
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          compare_branch: preview/pr-${{ github.event.number }}
          base_branch: production
          api_key: ${{ secrets.NEON_API_KEY }}

  neon-cleanup-branch:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete the Neon branch for this PR
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}
          api_key: ${{ secrets.NEON_API_KEY }}

# Not yet in this workflow (add as the corresponding code lands):
#   - unit/integration tests once apps/* have real code (packages/backtest-core
#     has its own `test` job above -- extend that pattern per-package, not a
#     single repo-wide pytest invocation, since apps/* and packages/db have
#     very different runtime dependencies -- e.g. packages/db's tests would
#     need a real Postgres, unlike packages/backtest-core's pure-logic ones)
#   - type-check (mypy) once agent-orchestrator/execution exist
#
# Auto-merge policy (set up in GitHub repo Settings, not expressible in this
# YAML): enable "Allow auto-merge" + branch protection requiring the jobs
# above to pass on `main`. CODEOWNERS (.github/CODEOWNERS) already forces
# manual review on risk_gate.py, execution/custody/, and DB migrations, so
# auto-merge can never silently touch those paths.
#
# Railway deploy is intentionally NOT an Action here: connect the GitHub
# repo directly in each Railway service's Settings -> Source for native
# auto-deploy on push to main (no secret needed for that basic flow).
